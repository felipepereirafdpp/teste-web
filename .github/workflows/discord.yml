name: Discord Changelog

on:
  push:
    branches:
      - main

jobs:
  changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commit info
        run: |
          echo "DATE=$(date '+%d/%m/%Y')" >> $GITHUB_ENV
          echo "AUTHOR=$(git log -1 --pretty=format:'%an')" >> $GITHUB_ENV

      - name: Get commits
        run: |
          ADDED=$(git log -10 --pretty=format:"%s" | grep -i "^feat" | sed 's/^feat: /**вЂұ** /')
          CHANGED=$(git log -10 --pretty=format:"%s" | grep -i "^change" | sed 's/^change: /**вЂұ** /')
          FIXED=$(git log -10 --pretty=format:"%s" | grep -i "^fix" | sed 's/^fix: /**вЂұ** /')

          echo "ADDED<<EOF" >> $GITHUB_ENV
          echo "$ADDED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "CHANGED<<EOF" >> $GITHUB_ENV
          echo "$CHANGED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "FIXED<<EOF" >> $GITHUB_ENV
          echo "$FIXED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send Embed
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"рџ“ұ CHANGELOG - ATUALIZAГ‡ГѓO DO SERVIDOR\",
              \"description\": \"**рџ“… Data:** ${DATE}\n**рџ‘¤ Autor:** ${AUTHOR}\n\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n\n**рџџұ Added**\n${ADDED:-вЂұ Nenhuma alteraГ§ГӘo}\n\n**рџџҰ Changed**\n${CHANGED:-вЂұ Nenhuma alteraГ§ГӘo}\n\n**рџ”ө Fixed**\n${FIXED:-вЂұ Nenhuma alteraГ§ГӘo}\n\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\",
              \"color\": 16766720,
              \"footer\": {
                \"text\": \"AtualizaГ§ГӘo enviada automaticamente pelo GitHub\"
              }
            }]
          }" \
          ${{ secrets.ULTRA_BOT }}