name: Discord Changelog

on:
  push:
    branches:
      - main

jobs:
  changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commit info
        run: |
          echo "DATE=$(date '+%d/%m/%Y')" >> $GITHUB_ENV
          echo "AUTHOR=$(git log -1 --pretty=format:'%an')" >> $GITHUB_ENV

      - name: Get commits
        run: |
          ADDED=$(git log -10 --pretty=format:"%s" | grep -i "^feat" | sed 's/^feat: /**вЂў** /')
          CHANGED=$(git log -10 --pretty=format:"%s" | grep -i "^change" | sed 's/^change: /**вЂў** /')
          FIXED=$(git log -10 --pretty=format:"%s" | grep -i "^fix" | sed 's/^fix: /**вЂў** /')

          DESC="**рџ‘¤ Autor:** $(git log -1 --pretty=format:'%an')\n\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n"

          if [ ! -z "$ADDED" ]; then
            DESC="${DESC}\n**рџџў Added**\n${ADDED}\n"
          fi

          if [ ! -z "$CHANGED" ]; then
            DESC="${DESC}\n**рџџЎ Changed**\n${CHANGED}\n"
          fi

          if [ ! -z "$FIXED" ]; then
            DESC="${DESC}\n**рџ”ґ Fixed**\n${FIXED}\n"
          fi

          DESC="${DESC}\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ"

          echo "DESC<<EOF" >> $GITHUB_ENV
          echo -e "$DESC" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send Embed
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"рџ“ў CHANGELOG - ATUALIZAГ‡ГѓO DO SERVIDOR ${DATE}\",
              \"description\": \"${DESC}\",
              \"color\": 16766720,
              \"footer\": {
                \"text\": \"AtualizaГ§ГЈo enviada automaticamente pelo GitHub\"
              }
            }]
          }" \
          ${{ secrets.ULTRA_BOT }}