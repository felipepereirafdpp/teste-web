name: Notificação de Change Log no Discord

on:
  push:
    branches:
      - "*"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Ler Change Log (seguro)
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            CONTENT=$(head -c 1800 CHANGELOG.md)
          else
            CONTENT="CHANGELOG.md não encontrado."
          fi

          # Escapa caracteres para JSON
          CONTENT_ESCAPED=$(printf "%s" "$CONTENT" | sed 's/\\/\\\\/g; s/"/\\"/g; s/$/\\n/g')

          echo "content=$CONTENT_ESCAPED" >> $GITHUB_OUTPUT

      - name: Enviar para Discord
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \"🚀 Atualização no Change Log!\\n\\nÚltimas alterações:\\n\\n\`\`\`\\n${{ steps.changelog.outputs.content }}\\n\`\`\`\\n\\n⚡ Enviado automaticamente pelo GitHub Actions\"}" \
          ${{ secrets.ULTRA_BOT }}
