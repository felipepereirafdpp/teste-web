name: Notificacao ChangeLog Discord

on:
  push:
   

jobs:
  notifyChangeLog:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Enviar ChangeLog para Discord
        env:
          WEBHOOK_URL: ${{ secrets.ULTRA_BOT }}
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content":"Nova atualizacao enviada para o repositorio"}' \
          $WEBHOOK_URL