name: Notificação de Change Log no Discord

on:
  push:
    branches:
      - "*"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Enviar para Discord
        env:
          WEBHOOK_URL: ${{ secrets.ULTRA_BOT }}
        run: |
          if [ -f CHANGELOG.md ]; then
            CHANGES=$(head -n 15 CHANGELOG.md)
          else
            CHANGES="Arquivo CHANGELOG.md não encontrado."
          fi

          MESSAGE=" Change Log / Registro de Alterações - Todas as mudanças relevantes do servidor são documentadas aqui. Este projeto segue os padrões Keep a Changelog e Semantic Versioning. $CHANGES ⚡ Atualização enviada automaticamente pelo GitHub Actions."

          jq -n --arg content "$MESSAGE" '{content: $content}' | curl -H "Content-Type: application/json" -d @- $WEBHOOK_URL