name: Discord Changelog

on:
  push:
    branches:
      - main

jobs:
  changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commits
        id: commits
        run: |
          ADDED=$(git log -10 --pretty=format:"%s" | grep -i "^feat" | sed 's/^feat: /• /')
          CHANGED=$(git log -10 --pretty=format:"%s" | grep -i "^change" | sed 's/^change: /• /')
          FIXED=$(git log -10 --pretty=format:"%s" | grep -i "^fix" | sed 's/^fix: /• /')

          echo "ADDED<<EOF" >> $GITHUB_ENV
          echo "$ADDED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "CHANGED<<EOF" >> $GITHUB_ENV
          echo "$CHANGED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "FIXED<<EOF" >> $GITHUB_ENV
          echo "$FIXED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send Embed
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"📢 CHANGELOG - ATUALIZAÇÃO DO SERVIDOR\",
              \"color\": 16766720,
              \"fields\": [
                {
                  \"name\": \"🆕 Added\",
                  \"value\": \"${ADDED:-Sem alterações}\",
                  \"inline\": false
                },
                {
                  \"name\": \"⚙️ Changed\",
                  \"value\": \"${CHANGED:-Sem alterações}\",
                  \"inline\": false
                },
                {
                  \"name\": \"🐛 Fixed\",
                  \"value\": \"${FIXED:-Sem alterações}\",
                  \"inline\": false
                }
              ],
              \"footer\": {
                \"text\": \"Atualização enviada automaticamente pelo GitHub\"
              }
            }]
          }" \
          ${{ secrets.ULTRA_BOT }}