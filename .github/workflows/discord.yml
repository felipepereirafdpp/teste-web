name: Notificacao Changelog Discord

on:
  push:

jobs:
  notifyChangeLog:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Pegar info commit
        run: |
          echo "COMMIT_MSG=$(git log -1 --pretty=%B)" >> $GITHUB_ENV
          echo "COMMIT_AUTHOR=$(git log -1 --pretty=%an)" >> $GITHUB_ENV

      - name: Ler ChangeLog
        run: |
          CHANGELOG=$(awk '/\[Unreleased\]/{flag=1;next}/^---/{flag=0}flag' CHANGELOG.md | sed ':a;N;$!ba;s/\n/\\n/g')
          echo "CHANGELOG=$CHANGELOG" >> $GITHUB_ENV

      - name: Enviar para Discord
        env:
          WEBHOOK_URL: ${{ secrets.ULTRA_BOT }}
        run: |
          MESSAGE="Atualizacao do Servidor\n\nAutor: $COMMIT_AUTHOR\nCommit: $COMMIT_MSG\n\nChange Log\n\n[Unreleased]\n\n$CHANGELOG"

          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"$MESSAGE\"}" \
          $WEBHOOK_URL