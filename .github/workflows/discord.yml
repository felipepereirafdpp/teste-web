name: Discord Daily Changelog

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Date
        run: |
          echo "DATE=$(date '+%d/%m/%Y')" >> $GITHUB_ENV

      - name: Get commits of the day
        run: |
          ADDED=$(git log --since="today" --pretty=format:"%s" | grep -i "^feat" | sed 's/^feat: /вЂў /')
          POLICE=$(git log --since="today" --pretty=format:"%s" | grep -i "^police" | sed 's/^police: /вЂў /')
          CHANGED=$(git log --since="today" --pretty=format:"%s" | grep -i "^change" | sed 's/^change: /вЂў /')
          FIXED=$(git log --since="today" --pretty=format:"%s" | grep -i "^fix" | sed 's/^fix: /вЂў /')

          echo "ADDED<<EOF" >> $GITHUB_ENV
          echo "$ADDED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "POLICE<<EOF" >> $GITHUB_ENV
          echo "$POLICE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "CHANGED<<EOF" >> $GITHUB_ENV
          echo "$CHANGED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "FIXED<<EOF" >> $GITHUB_ENV
          echo "$FIXED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send Embed
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"рџ“ў Changelog do dia ${DATE}\",
              \"color\": 16766720,
              \"description\": \"в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n\nрџ“ў **AtualizaГ§Гµes e Ajustes**\n\n${ADDED:-вЂў Nenhuma atualizaГ§ГЈo hoje}\n\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n\nрџљ” **ForГ§as Policiais**\n\n${POLICE:-вЂў Nenhuma alteraГ§ГЈo}\n\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n\nвљ™пёЏ **MudanГ§as**\n\n${CHANGED:-вЂў Nenhuma mudanГ§a}\n\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n\nрџђ› **CorreГ§Гµes**\n\n${FIXED:-вЂў Nenhuma correГ§ГЈo}\n\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\",
              \"footer\": {
                \"text\": \"Changelog automГЎtico enviado pelo GitHub\"
              }
            }]
          }" \
          ${{ secrets.ULTRA_BOT }}