name: Notificação de Change Log no Discord

on:
  push:
    branches:
      - "*"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Enviar para Discord
        env:
          WEBHOOK_URL: ${{ secrets.ULTRA_BOT }}
        run: |
          if [ -f CHANGELOG.md ]; then
            CHANGES=$(head -n 80 CHANGELOG.md)
          else
            CHANGES="CHANGELOG.md não encontrado."
          fi

          jq -n --arg content "Change Log / Registro de Alterações\n\n\`\`\`\n$CHANGES\n\`\`\`\n." \
          '{content: $content}' \
          | curl -H "Content-Type: application/json" -d @- $WEBHOOK_URL