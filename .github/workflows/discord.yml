name: Notificacao Changelog Discord

on:
  push:

jobs:
  notifyChangeLog:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Pegar info commit
        run: |
          echo "COMMIT_MSG=$(git log -1 --pretty=%B)" >> $GITHUB_ENV
          echo "COMMIT_AUTHOR=$(git log -1 --pretty=%an)" >> $GITHUB_ENV
          echo "CHANGELOG=$(head -n 15 CHANGELOG.md | tr '\n' ' ')" >> $GITHUB_ENV

      - name: Enviar para Discord
        env:
          WEBHOOK_URL: ${{ secrets.ULTRA_BOT }}
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [
              {
                \"title\": \"Atualização do Servidor\",
                \"color\": 16766720,
                \"fields\": [
                  {
                    \"name\": \"Autor\",
                    \"value\": \"$COMMIT_AUTHOR\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"Commit\",
                    \"value\": \"$COMMIT_MSG\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"Change Log\",
                    \"value\": \"$CHANGELOG\"
                  }
                ],
                \"footer\": {
                  \"text\": \"Atualizacao enviada automaticamente pelo GitHub Actions\"
                }
              }
            ]
          }" \
          $WEBHOOK_URL