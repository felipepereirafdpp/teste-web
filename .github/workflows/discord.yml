name: Notificação de Change Log no Discord

on:
  push:
    branches:
      - "*"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Enviar para Discord
        env:
          WEBHOOK_URL: ${{ secrets.ULTRA_BOT }}
        run: |
          # 1. Lê o arquivo e remove o que estraga o JSON (aspas e quebras de linha extras)
          # Se o arquivo não existir, gera uma mensagem simples
          if [ -f CHANGELOG.md ]; then
            CHANGES=$(head -n 15 CHANGELOG.md | tr -d '"' | tr -d '`' | tr '\n' ' ')
          else
            CHANGES="Arquivo CHANGELOG.md não encontrado."
          fi

          # 2. Faz o POST direto
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"**Atualização no Change Log Felipe!**\n\`\`\`\n$CHANGES\n\`\`\`\"}" \
          $WEBHOOK_URL