name: Notificacao ChangeLog Discord

on:
  push:
    branches:
      - "*"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Enviar ChangeLog para Discord
        env:
          WEBHOOK_URL: ${{ secrets.ULTRA_BOT }}
        run: |
          if [ -f CHANGELOG.md ]; then
            CHANGELOG=$(head -n 30 CHANGELOG.md | tr '\n' ' ')
          else
            CHANGELOG="CHANGELOG.md nao encontrado"
          fi

          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"Atualizacao do Servidor\n\nChange Log / Registro de Alteracoes\n\nTodas as mudancas relevantes do servidor sao documentadas aqui.\n\nEste projeto segue os padroes Keep a Changelog e Semantic Versioning.\n\n$CHANGELOG\n\nCommit realizado seguindo o padrao Conventional Commits.\n\nAtualizacao enviada automaticamente pelo GitHub Actions.\"}" \
          $WEBHOOK_URL