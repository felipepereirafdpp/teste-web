name: Notificação de Change Log no Discord

on:
  push:
    branches:
      - "*"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Ler Change Log (seguro)
        run: |
          if [ -f CHANGELOG.md ]; then
            CONTENT=$(head -c 1800 CHANGELOG.md)
          else
            CONTENT="CHANGELOG.md não encontrado."
          fi

          # Salva corretamente com multiline
          echo "CONTENT<<EOF" >> $GITHUB_ENV
          echo "$CONTENT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Enviar para Discord
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \" **Atualização no Change Log!**\n\n Últimas alterações do servidor:\n\n\`\`\`\n$CONTENT\n\`\`\`\n\n⚡ Atualização enviada automaticamente pelo GitHub Actions\"}" \
          ${{ secrets.ULTRA_BOT }}