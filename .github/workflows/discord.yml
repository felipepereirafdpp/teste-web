name: Discord Daily Changelog

on:
  schedule:
    - cron: "0 23 * * *" # roda todo dia
  workflow_dispatch:

jobs:
  changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pegar data
        run: |
          echo "DATE=$(date '+%d/%m/%Y')" >> $GITHUB_ENV

      - name: Pegar commits do dia
        run: |
          COMMITS=$(git log --since="00:00" --pretty=format:"• %s (%an)")

          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Enviar para Discord
        env:
          WEBHOOK: ${{ secrets.ULTRA_BOT }}
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"📢 CHANGELOG DO DIA ${DATE}\",
              \"color\": 16766720,
              \"description\": \"━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n📢 **Commits realizados hoje:**\n\n${COMMITS:-• Nenhum commit hoje}\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n🤖 Atualização automática via GitHub\"
            }]
          }" \
          $WEBHOOK