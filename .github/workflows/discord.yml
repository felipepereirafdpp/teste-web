name: Notificação de Change Log no Discord

on:
  push:
    branches:
      - "*"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Enviar para Discord
        env:
          WEBHOOK_URL: ${{ secrets.ULTRA_BOT }}
        run: |
          if [ -f CHANGELOG.md ]; then
            CHANGES=$(head -n 15 CHANGELOG.md | sed 's/"/\\"/g' | tr '\n' '\\n')
          else
            CHANGES="Arquivo CHANGELOG.md não encontrado"
          fi

          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"📜 **Change Log / Registro de Alterações**\n\n$CHANGES\n\n⚡ Atualização enviada automaticamente pelo GitHub Actions\"}" \
          $WEBHOOK_URL