name: Discord Changelog

on:
  push:
    branches:
      - main

jobs:
  changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commit info
        run: |
          echo "DATE=$(date '+%d/%m/%Y')" >> $GITHUB_ENV
          echo "AUTHOR=$(git log -1 --pretty=format:'%an')" >> $GITHUB_ENV

      - name: Get commits
        run: |
          ADDED=$(git log -10 --pretty=format:"%s" | grep -i "^feat" | sed 's/^feat: /**вҖў** /')
          CHANGED=$(git log -10 --pretty=format:"%s" | grep -i "^change" | sed 's/^change: /**вҖў** /')
          FIXED=$(git log -10 --pretty=format:"%s" | grep -i "^fix" | sed 's/^fix: /**вҖў** /')

          echo "ADDED<<EOF" >> $GITHUB_ENV
          echo "$ADDED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "CHANGED<<EOF" >> $GITHUB_ENV
          echo "$CHANGED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "FIXED<<EOF" >> $GITHUB_ENV
          echo "$FIXED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send Embed
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"рҹ“ў CHANGELOG - ATUALIZAГҮГғO DO SERVIDOR ${DATE}\",
              \"description\": \n**рҹ‘Ө Autor:** ${AUTHOR}\n\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n\n** Added**\n${ADDED:-вҖў Nenhuma alteraГ§ГЈo}\n\n** Changed**\n${CHANGED:-вҖў Nenhuma alteraГ§ГЈo}\n\n** Fixed**\n${FIXED:-вҖў Nenhuma alteraГ§ГЈo}\n\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\",
              \"color\": 16766720,
              \"footer\": {
                \"text\": \"AtualizaГ§ГЈo enviada automaticamente pelo GitHub\"
              }
            }]
          }" \
          ${{ secrets.ULTRA_BOT }}