name: Notificação de Change Log no Discord

on:
  push:
    branches:
      - "*"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Ler Change Log
        id: read_changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            # Pega as primeiras 15 linhas e remove caracteres problemáticos
            head -n 15 CHANGELOG.md | tr -d '"' | tr -d '`' > log_limpo.txt
          else
            echo "CHANGELOG.md não encontrado." > log_limpo.txt
          fi

      - name: Enviar para Discord
        run: |
          # Lemos o arquivo para uma variável do Bash neste step
          CONTEUDO=$(cat log_limpo.txt)
          
          # Enviamos via cURL usando um heredoc para o JSON
          curl -H "Content-Type: application/json" \
          -X POST \
          -d @- <<EOF
          {
            "content": "**Atualização no Change Log!**\n\nÚltimas alterações:\n\`\`\`\n$CONTEUDO\n\`\`\`\n\n⚡ Enviado via GitHub Actions"
          }
          EOF
        env:
          # Garanta que o segredo ULTRA_BOT é a URL do Webhook (https://discord.com/api/webhooks/...)
          ULTRA_BOT: ${{ secrets.ULTRA_BOT }}