name: Notificação de Change Log no Discord

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Ler Change Log
        id: changelog
        run: |
          echo "content<<EOF" >> $GITHUB_OUTPUT
          if [ -f CHANGELOG.md ]; then
            # Pega os primeiros 1800 caracteres e remove aspas/crases que quebram o JSON
            head -c 1800 CHANGELOG.md | tr -d '"' | tr -d '`' >> $GITHUB_OUTPUT
          else
            echo "CHANGELOG.md não encontrado." >> $GITHUB_OUTPUT
          fi
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Enviar para Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.ULTRA_BOT }}
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d @- <<EOF
          {
            "content": " **Atualização no Change Log!**\n\n Últimas alterações do servidor:\n\n\`\`\`\n${{ steps.changelog.outputs.content }}\n\`\`\`\n\n⚡ Atualização enviada automaticamente pelo GitHub Actions"
          }
          EOF